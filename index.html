<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>歐米斯生技 - 訂購單系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip-utils/0.1.0/jszip-utils.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background: #f4f4f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #1a337e; border-bottom: 2px solid #1a337e; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background: #1a337e; color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 8px; }
        .summary { text-align: right; background: #fffde7; padding: 15px; border: 1px solid #ffe082; font-weight: bold; }
        button { width: 100%; padding: 20px; background: #1a337e; color: white; border: none; font-size: 1.2em; cursor: pointer; border-radius: 5px; }
        button:hover { background: #000; }
    </style>
</head>
<body>

<div class="container">
    <h2>歐米斯生技 - 訂購單生成</h2>
    
    <div class="grid">
        <div><label>進貨廠商</label><input type="text" id="vender" value="鎮江機械"></div>
        <div><label>訂購日期</label><input type="date" id="date"></div>
        <div><label>訂購單號</label><input type="text" id="order_no" value="DV20272881"></div>
        <div><label>聯絡人</label><input type="text" id="contact" value="張俊埼"></div>
        <div><label>訂購人</label><input type="text" id="buyer" value="劉俊昇"></div>
    </div>

    <table>
        <thead>
            <tr><th>貨號</th><th>品項描述</th><th>數量</th><th>單價</th><th>小計</th></tr>
        </thead>
        <tbody id="itemBody"></tbody>
    </table>

    <div class="summary">
        合計(未稅): <span id="display_net">0</span><br>
        稅額(5%): <span id="display_tax">0</span><br>
        總計: <span id="display_grand">0</span>
    </div>

    <button onclick="generateDoc()">確認並下載訂購單</button>
</div>

<script>
    // 初始化
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').value = today;

    const tbody = document.getElementById('itemBody');
    for (let i = 1; i <= 7; i++) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" id="num${i}"></td>
            <td><input type="text" id="item${i}"></td>
            <td><input type="number" id="qty${i}" value="0" oninput="calculate()"></td>
            <td><input type="number" id="price${i}" value="0" oninput="calculate()"></td>
            <td id="sub${i}" align="right">0</td>
        `;
        tbody.appendChild(tr);
    }

    function calculate() {
        let totalNet = 0;
        for (let i = 1; i <= 7; i++) {
            const q = parseFloat(document.getElementById(`qty${i}`).value) || 0;
            const p = parseFloat(document.getElementById(`price${i}`).value) || 0;
            const sub = q * p;
            document.getElementById(`sub${i}`).innerText = sub.toLocaleString();
            totalNet += sub;
        }
        const tax = Math.round(totalNet * 0.05);
        document.getElementById('display_net').innerText = totalNet.toLocaleString();
        document.getElementById('display_tax').innerText = tax.toLocaleString();
        document.getElementById('display_grand').innerText = (totalNet + tax).toLocaleString();
        return { totalNet, tax, grand: totalNet + tax };
    }

    function generateDoc() {
        const res = calculate();
        const templateUrl = "template.docx?v=" + new Date().getTime();

        JSZipUtils.getBinaryContent(templateUrl, function(error, content) {
            if (error) { alert("讀取模板失敗！"); return; }
            
            try {
                const zip = new PizZip(content);
                const doc = new window.docxtemplater(zip, { 
                    paragraphLoop: true, 
                    linebreaks: true,
                    parser: function(tag) { return { get: function(scope) { return scope[tag]; } }; }
                });

                const data = {
                    vender: document.getElementById('vender').value,
                    date: document.getElementById('date').value,
                    order_no: document.getElementById('order_no').value,
                    contact: document.getElementById('contact').value,
                    buyer: document.getElementById('buyer').value,
                    total_net: res.totalNet.toLocaleString(),
                    tax: res.tax.toLocaleString(),
                    grand_total: res.grand.toLocaleString(),
                    c_5: "■", p_3: "■", p_6: "■"
                };

                for (let i = 1; i <= 7; i++) {
                    data["num"+i] = document.getElementById("num"+i).value;
                    data["item"+i] = document.getElementById("item"+i).value;
                    data["qty"+i] = document.getElementById("qty"+i).value || "";
                    data["price"+i] = document.getElementById("price"+i).value || "";
                    data["subtotal"+i] = (document.getElementById("qty"+i).value * document.getElementById("price"+i).value).toLocaleString();
                }

                doc.render(data);
                const out = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
                saveAs(out, "訂購單.docx");

            } catch (e) {
                console.error(e);
                alert("渲染失敗！請檢查 Word 標籤。錯誤原因：" + (e.properties?.errors?.[0]?.properties?.explanation || e.message));
            }
        });
    }
</script>
</body>
</html>
