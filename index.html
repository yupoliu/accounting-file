<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>歐米斯訂購單系統 - 最終修正版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip-utils/0.1.0/jszip-utils.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section-title { background: #e8f0fe; padding: 10px; font-weight: bold; margin: 20px 0 10px; border-left: 5px solid #2b579a; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        input[type="text"], input[type="date"], input[type="number"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; padding: 10px; background: #f9f9f9; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #2b579a; color: white; padding: 8px; }
        td { border: 1px solid #ddd; padding: 5px; }
        .summary { text-align: right; font-weight: bold; color: #d32f2f; padding: 15px; background: #fffde7; margin-top: 10px; }
        button { width: 100%; padding: 15px; background: #2b579a; color: white; border: none; border-radius: 8px; font-size: 1.2em; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>歐米斯生技 - 訂購單系統</h2>
    
    <div class="section-title">基本資料</div>
    <div class="grid">
        <div><label>進貨廠商</label><input type="text" id="vender" value="鎮江機械"></div>
        <div><label>訂購日期</label><input type="date" id="date"></div>
        <div><label>訂購單號</label><input type="text" id="order_no" value="DV20272881"></div>
        <div><label>廠商電話</label><input type="text" id="tel"></div>
        <div><label>聯絡人</label><input type="text" id="contact" value="張俊埼"></div>
        <div><label>訂購人</label><input type="text" id="buyer" value="劉俊昇"></div>
    </div>

    <div class="section-title">類別</div>
    <div class="checkbox-group">
        <label><input type="checkbox" id="c_1"> 零用金</label>
        <label><input type="checkbox" id="c_2"> 實驗耗材</label>
        <label><input type="checkbox" id="c_3"> 設備</label>
        <label><input type="checkbox" id="c_4"> 小額採購</label>
        <label><input type="checkbox" id="c_5" checked> 其他</label>
    </div>

    <div class="section-title">付款方式</div>
    <div class="checkbox-group">
        <label><input type="checkbox" id="p_1"> 預付</label>
        <label><input type="checkbox" id="p_2"> 請款</label>
        <label><input type="checkbox" id="p_3" checked> 月結30日</label>
        <label><input type="checkbox" id="p_6" checked> 帳戶匯款</label>
    </div>

    <table>
        <thead><tr><th>序</th><th>貨號</th><th>描述</th><th>數量</th><th>單價</th><th>小計</th></tr></thead>
        <tbody id="itemBody"></tbody>
    </table>

    <div class="summary">
        合計: <span id="display_net">0</span> | 稅額: <span id="display_tax">0</span> | 總計: <span id="display_grand">0</span>
    </div>

    <button onclick="generateDoc()">1. 確認並生成 Word</button>
</div>

<script>
    // 初始化表格
    const tbody = document.getElementById('itemBody');
    for (let i = 1; i <= 7; i++) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${i}</td><td><input type="text" id="num${i}"></td><td><input type="text" id="item${i}"></td>
            <td><input type="number" id="qty${i}" value="0" oninput="calculate()"></td>
            <td><input type="number" id="price${i}" value="0" oninput="calculate()"></td>
            <td id="sub${i}" align="right">0</td>`;
        tbody.appendChild(tr);
    }

    function calculate() {
        let totalNet = 0;
        for (let i = 1; i <= 7; i++) {
            const q = parseFloat(document.getElementById(`qty${i}`).value) || 0;
            const p = parseFloat(document.getElementById(`price${i}`).value) || 0;
            const sub = q * p;
            document.getElementById(`sub${i}`).innerText = sub.toLocaleString();
            totalNet += sub;
        }
        const tax = Math.round(totalNet * 0.05);
        document.getElementById('display_net').innerText = totalNet.toLocaleString();
        document.getElementById('display_tax').innerText = tax.toLocaleString();
        document.getElementById('display_grand').innerText = (totalNet + tax).toLocaleString();
        return { totalNet, tax, grand: totalNet + tax };
    }

    function generateDoc() {
        const res = calculate();
        const getCheck = (id) => document.getElementById(id).checked ? "■" : "□";
        const templateUrl = "https://yupoliu.github.io/accounting-file/template.docx?v=" + new Date().getTime();

        JSZipUtils.getBinaryContent(templateUrl, function(error, content) {
            if (error) { alert("無法讀取 template.docx"); return; }
            const zip = new PizZip(content);
            const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

            const data = {
                vender: document.getElementById('vender').value,
                date: document.getElementById('date').value,
                order_no: document.getElementById('order_no').value,
                tel: document.getElementById('tel').value,
                contact: document.getElementById('contact').value,
                buyer: document.getElementById('buyer').value,
                total_net: res.totalNet.toLocaleString(),
                tax: res.tax.toLocaleString(),
                grand_total: res.grand.toLocaleString(),
                c_1: getCheck('c_1'), c_2: getCheck('c_2'), c_3: getCheck('c_3'), c_4: getCheck('c_4'), c_5: getCheck('c_5'),
                p_3: getCheck('p_3'), p_6: getCheck('p_6'),
                issue_date: document.getElementById('date').value,
                approval_date: document.getElementById('date').value,
                request_date: document.getElementById('date').value,
                payment_date: document.getElementById('date').value
            };

            for (let i = 1; i <= 7; i++) {
                data[`num${i}`] = document.getElementById(`num${i}`).value;
                data[`item${i}`] = document.getElementById(`item${i}`).value;
                data[`qty${i}`] = document.getElementById(`qty${i}`).value || "";
                data[`price${i}`] = document.getElementById(`price${i}`).value || "";
                data[`subtotal${i}`] = (document.getElementById(`qty${i}`).value * document.getElementById(`price${i}`).value).toLocaleString();
            }

            try {
                doc.render(data);
                const out = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
                saveAs(out, `訂購單_${data.vender}.docx`);
            } catch (e) {
                console.error(e);
                alert("渲染出錯！請檢查 Word 標籤：" + e.properties.errors[0].message);
            }
        });
    }
</script>
</body>
</html>
