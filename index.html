<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>歐米斯生技 - 訂購單系統 (完整欄位版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip-utils/0.1.0/jszip-utils.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2b579a; border-bottom: 3px solid #2b579a; padding-bottom: 10px; margin-top: 0; }
        .section-title { background: #e8f0fe; padding: 10px; font-weight: bold; margin: 25px 0 10px; border-left: 5px solid #2b579a; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        label { font-size: 0.9em; font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="date"], input[type="number"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; padding: 10px; background: #f9f9f9; border-radius: 4px; border: 1px solid #eee; }
        .checkbox-item { display: flex; align-items: center; font-size: 0.9em; cursor: pointer; }
        .checkbox-item input { margin-right: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #2b579a; color: white; padding: 8px; font-size: 0.9em; }
        td { padding: 5px; border: 1px solid #dee2e6; }
        .summary-box { margin-top: 20px; text-align: right; font-size: 1.1em; font-weight: bold; color: #d32f2f; background: #fffde7; padding: 15px; border: 1px solid #ffe082; }
        button { width: 100%; padding: 18px; background: #2b579a; color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; margin-top: 30px; }
        button:hover { background: #1a337e; }
    </style>
</head>
<body>

<div class="container">
    <h2>歐米斯生技有限公司 - 訂購單系統</h2>
    
    <div class="section-title">1. 基本資料</div>
    <div class="grid">
        <div><label>進貨廠商</label><input type="text" id="vender" value="鎮江機械"></div>
        <div><label>訂購日期</label><input type="date" id="date"></div>
        <div><label>訂購單號</label><input type="text" id="order_no" value="DV20272881"></div>
        <div><label>廠商電話</label><input type="text" id="tel"></div>
        <div><label>聯絡人</label><input type="text" id="contact" value="張俊埼"></div>
        <div><label>訂購人 {buyer}</label><input type="text" id="buyer" value="劉俊昇"></div>
    </div>

    <div class="section-title">2. 類別 (勾選會填入 ■)</div>
    <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="c_1"> 零用金</label>
        <label class="checkbox-item"><input type="checkbox" id="c_2"> 實驗耗材/檢測</label>
        <label class="checkbox-item"><input type="checkbox" id="c_3"> 設備</label>
        <label class="checkbox-item"><input type="checkbox" id="c_4"> 小額採購</label>
        <label class="checkbox-item"><input type="checkbox" id="c_5" checked> 其他</label>
    </div>

    <div class="section-title">3. 付款方式</div>
    <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="p_1"> 預付</label>
        <label class="checkbox-item"><input type="checkbox" id="p_2"> 請款</label>
        <label class="checkbox-item"><input type="checkbox" id="p_3" checked> 月結30日</label>
        <label class="checkbox-item"><input type="checkbox" id="p_4"> 現金支付</label>
        <label class="checkbox-item"><input type="checkbox" id="p_5"> 現金匯款</label>
        <label class="checkbox-item"><input type="checkbox" id="p_6" checked> 帳戶匯款</label>
        <label class="checkbox-item"><input type="checkbox" id="p_7"> 代墊</label>
        <label class="checkbox-item"><input type="checkbox" id="p_8"> 支票</label>
    </div>

    <div class="section-title">4. 品項明細</div>
    <table>
        <thead>
            <tr><th>序</th><th>貨號</th><th>品項描述</th><th>數量</th><th>單價(未稅)</th><th>小計</th></tr>
        </thead>
        <tbody id="itemBody"></tbody>
    </table>

    <div class="summary-box">
        合計: NT. <span id="display_net">0</span> | 稅額: NT. <span id="display_tax">0</span> | 總計: NT. <span id="display_grand">0</span>
    </div>

    <button onclick="generateDoc()">生成並下載 Word 訂購單</button>
</div>

<script>
    // 初始化日期與表格
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    const tbody = document.getElementById('itemBody');
    for (let i = 1; i <= 7; i++) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${i}</td><td><input type="text" id="num${i}"></td><td><input type="text" id="item${i}"></td>
                        <td><input type="number" id="qty${i}" value="0" oninput="calculate()"></td>
                        <td><input type="number" id="price${i}" value="0" oninput="calculate()"></td>
                        <td id="sub_display${i}" align="right">0</td>`;
        tbody.appendChild(tr);
    }

    function calculate() {
        let totalNet = 0;
        for (let i = 1; i <= 7; i++) {
            const q = parseFloat(document.getElementById(`qty${i}`).value) || 0;
            const p = parseFloat(document.getElementById(`price${i}`).value) || 0;
            const sub = q * p;
            document.getElementById(`sub_display${i}`).innerText = sub.toLocaleString();
            totalNet += sub;
        }
        const tax = Math.round(totalNet * 0.05);
        document.getElementById('display_net').innerText = totalNet.toLocaleString();
        document.getElementById('display_tax').innerText = tax.toLocaleString();
        document.getElementById('display_grand').innerText = (totalNet + tax).toLocaleString();
        return { totalNet, tax, grand: totalNet + tax };
    }

    function generateDoc() {
        const res = calculate();
        const getMark = (id) => document.getElementById(id).checked ? "■" : "□";
        
        // 加上隨機數避免讀取舊檔案
        const templateUrl = "template.docx?t=" + new Date().getTime();

        JSZipUtils.getBinaryContent(templateUrl, function(error, content) {
            if (error) { alert("讀取模板失敗！請確認 template.docx 已上傳。"); return; }
            
            try {
                const zip = new PizZip(content);
                const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

                const data = {
                    vender: document.getElementById('vender').value,
                    date: document.getElementById('date').value,
                    order_no: document.getElementById('order_no').value,
                    tel: document.getElementById('tel').value,
                    contact: document.getElementById('contact').value,
                    buyer: document.getElementById('buyer').value,
                    // 類別勾選
                    c_1: getMark('c_1'), c_2: getMark('c_2'), c_3: getMark('c_3'), c_4: getMark('c_4'), c_5: getMark('c_5'),
                    // 付款勾選
                    p_1: getMark('p_1'), p_2: getMark('p_2'), p_3: getMark('p_3'), p_4: getMark('p_4'),
                    p_5: getMark('p_5'), p_6: getMark('p_6'), p_7: getMark('p_7'), p_8: getMark('p_8'),
                    // 金額
                    total_net: res.totalNet.toLocaleString(),
                    tax: res.tax.toLocaleString(),
                    grand_total: res.grand.toLocaleString()
                };

                // 填充 7 列數據
                for (let i = 1; i <= 7; i++) {
                    data[`num${i}`] = document.getElementById(`num${i}`).value;
                    data[`item${i}`] = document.getElementById(`item${i}`).value;
                    data[`qty${i}`] = document.getElementById(`qty${i}`).value || "";
                    data[`price${i}`] = document.getElementById(`price${i}`).value || "";
                    data[`subtotal${i}`] = (document.getElementById(`qty${i}`).value * document.getElementById(`price${i}`).value).toLocaleString();
                }

                doc.render(data);
                const out = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
                saveAs(out, `訂購單_${data.vender}.docx`);
            } catch (e) {
                console.error(e);
                alert("渲染出錯！原因可能是 Word 模板內的標籤語法有誤，請檢查括號是否完整。");
            }
        });
    }
</script>
</body>
</html>
